name: CI - Backend PHP

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: contavision_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, zip, gd
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: /home/runner/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          composer install --prefer-dist --no-progress
          if [ -f composer-require-checker.phar ]; then
            chmod +x composer-require-checker.phar
          fi

      - name: PHP Syntax Check
        working-directory: ./backend
        run: find src -name "*.php" -exec php -l {} \; | grep -v "No syntax errors" || true

      - name: PHPStan Analysis
        working-directory: ./backend
        run: ./vendor/bin/phpstan analyse src --level=5 --error-format=github || true

      - name: PHPUnit Tests
        working-directory: ./backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: contavision_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: ./vendor/bin/phpunit --configuration phpunit.xml || echo "Tests not yet configured"

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t contavision-backend .

      - name: Test Docker image
        run: docker run --rm contavision-backend php -v
