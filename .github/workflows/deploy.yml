name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/contavision-backend:latest

      - name: Trigger Render Deploy (Backend)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" || echo "Render hook not configured"

  deploy-monte-carlo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Monte Carlo
        uses: docker/build-push-action@v6
        with:
          context: ./monte-carlo
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/contavision-monte-carlo:latest

      - name: Trigger Render Deploy (Monte Carlo)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_MONTE_CARLO }}" || echo "Render hook not configured"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/contavision-frontend:latest

      - name: Trigger Vercel/Netlify Deploy
        run: |
          echo "Frontend pushed to Docker Hub"

  health-check:
    needs: [deploy-backend, deploy-monte-carlo, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Verify Backend Health
        run: |
          sleep 30
          curl -f "${{ secrets.BACKEND_URL }}/api/health" || echo "Backend health check failed"

      - name: Verify Monte Carlo Health
        run: |
          curl -f "${{ secrets.MONTE_CARLO_URL }}/health" || echo "Monte Carlo health check failed"

      - name: Verify Frontend
        run: |
          curl -f "${{ secrets.FRONTEND_URL }}" || echo "Frontend health check failed"
